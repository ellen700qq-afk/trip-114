<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>順天國中114畢旅</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f7f7; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        /* 頁首圓弧與重疊銜接 */
        .main-content { border-radius: 40px 40px 0 0; margin-top: -30px; background: white; padding: 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
        /* 跑馬燈 */
        .marquee { overflow: hidden; white-space: nowrap; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; color: #ef4444; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        /* 隱藏捲軸但保持滾動 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 公告跑馬燈 -->
        <div class="marquee py-2">
            <p>⚡ 重要提醒：12/29 (一) 07:30 請準時於順天國中集合！請遵守團隊紀律，注意安全！</p>
        </div>

        <!-- 頁首 Banner -->
        <div class="relative h-[150px] w-full overflow-hidden">
            <img src="底圖.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/428x150?text=請確認底圖.jpg'" alt="Banner">
            <!-- 浮動 Tab 按鈕 -->
            <div class="absolute bottom-4 right-4 flex gap-2 bg-black/20 backdrop-blur-md p-1 rounded-full">
                <button @click="currentTab='schedule'" :class="['px-5 py-2 rounded-full transition-all', currentTab==='schedule'?'bg-white text-blue-600 shadow':'text-white']">行程</button>
                <button @click="currentTab='info'" :class="['px-5 py-2 rounded-full transition-all', currentTab==='info'?'bg-white text-blue-600 shadow':'text-white']">資訊</button>
            </div>
        </div>

        <!-- 主要內容 -->
        <main class="main-content min-h-screen">
            <!-- 每日行程 -->
            <div v-if="currentTab === 'schedule'">
                <h1 class="text-2xl font-bold text-slate-800 mb-6">📅 每日行程表</h1>
                <div v-for="day in scheduleData" class="mb-8">
                    <h2 class="text-lg font-bold text-blue-500 mb-4">{{day.dayTitle}}</h2>
                    <div class="space-y-4">
                        <div v-for="item in day.items" class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold text-blue-400">{{item.time}}</span>
                            </div>
                            <a v-if="item.link" :href="item.link" target="_blank" class="block text-lg font-bold text-slate-800 hover:text-blue-600 underline">
                                {{item.name}}
                            </a>
                            <p v-else class="text-lg font-bold text-slate-800">{{item.name}}</p>
                            <p class="text-sm text-slate-500 mt-1">{{item.note}}</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 活動資訊 -->
            <div v-if="currentTab === 'info'">
                <h1 class="text-2xl font-bold text-slate-800 mb-6">ℹ️ 活動資訊</h1>
                <div class="space-y-4">
                    <details class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
                        <summary class="font-bold text-slate-700 cursor-pointer outline-none">📢 乘車資訊</summary>
                        <p class="mt-3 text-sm text-slate-600 leading-relaxed">時間：12/29 (一) 07:30<br>地點：順天國中校園內</p>
                    </details>
                    <details class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
                        <summary class="font-bold text-slate-700 cursor-pointer outline-none">🏨 悠活度假村住宿須知</summary>
                        <ul class="mt-3 text-sm text-slate-600 space-y-2 list-disc pl-4">
                            <li>房卡感應閃綠燈即可，自動上鎖。</li>
                            <li>需插入房卡方可通電。</li>
                            <li>電話按9聯絡櫃檯。</li>
                        </ul>
                    </details>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    currentTab: 'schedule',
                    scheduleData: [
                        { dayTitle: '第一天 (12/29)', items: [
                            {time: '09:30', name: '嘉義檜意森活村', link: 'https://www.hinokivillage.com.tw/index.php?lang=tw', note: '百年林業歷史文創園區'},
                            {time: '09:30', name: '北門驛', link: 'https://www.chiayi.gov.tw/News_Content.aspx?n=512&s=216167', note: '阿里山森林鐵路起點'}
                        ]},
                        { dayTitle: '第二天 (12/30)', items: [
                            {time: '10:00', name: '貓鼻頭風景區', link: 'https://www.ktnp.gov.tw/News_Content2.aspx?n=5C28A0E32DF925F9&sms=C88B5251F308CE96&s=9C8B9499841F2B1D', note: '豐富地質景觀與自然資源'}
                        ]}
                    ]
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
